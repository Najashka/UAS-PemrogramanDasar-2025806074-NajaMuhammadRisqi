<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>Sales Inventory</title>

<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial;

    background:#f5f5f5;

}

.loader{

    text-align:center;

}

.spinner{

    width:45px;

    height:45px;

    border:5px solid #ddd;

    border-top:5px solid #2ecc71;

    border-radius:50%;

    animation:spin .8s linear infinite;

    margin:auto;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

p{

margin-top:20px;

color:#666;

}

</style>

</head>

<body>

<div class="loader">

    <div class="spinner"></div>

    <p>Loading...</p>

</div>

<script>

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if(!token || !user){

    location.href="pages/login.html";

}else{

    if(user.role==="admin"){

        location.href="pages/dashboard.html";

    }else if(user.role==="cashier"){

        location.href="pages/sale.html";

    }else{

        localStorage.clear();

        location.href="pages/login.html";

    }

}

</script>

</body>

</html>
