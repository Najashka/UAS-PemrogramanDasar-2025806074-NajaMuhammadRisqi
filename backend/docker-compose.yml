services:

  mysql:
    image: mysql:8.4

    container_name: sales_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sales_inventory
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: sales_phpmyadmin

    restart: always

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql

    depends_on:
      - mysql

volumes:

  mysql_data: